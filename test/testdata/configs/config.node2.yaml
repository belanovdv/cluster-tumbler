local:
  etcd:
    endpoints:
      - ds-cluster-node3.mp10.ptsecurity.ru:2379
      - ds-cluster-node4.mp10.ptsecurity.ru:2379
      - ds-cluster-node5.mp10.ptsecurity.ru:2379
    dial_timeout: 3s
    retry_interval: 1s
  logger:
    level: debug
    format: plain
    console: true
    file: ""
  api:
    listen: ":5080"
    # token: "your-secret-token"  # optional; if set, all /api/v1/* requests require Authorization: Bearer <token>

cluster:
  id: second_cluster
  name: "custom second_cluster name"
  groups:
    geo_dc:
      name: "custom geo dc name"
  failover_mode: manual
  leader_ttl: 2s
  leader_renew_interval: 500ms
  session_ttl: 30s

agent:
  node_id: node2
  name: "custom node1 name"
  memberships:
    - cluster_group: geo_dc
      management_group: DC2
      priority: 1
      roles:
        - core
        - mc

roles:
  postgresql:
    name: "custom PG mane"
    actors:
      probe_active:
        - ./test/testdata/scripts/probe_active.sh
        - pg
      set_active: 
        - ./test/testdata/scripts/set_active.sh
        - pg
      probe_passive:
        - ./test/testdata/scripts/probe_passive.sh
        - pg 
      set_passive: 
        - ./test/testdata/scripts/set_passive.sh
        - pg 
      force_stop: 
        - ./test/testdata/scripts/force_stop.sh
        - pg
    timeouts:
      exec: 5s
      converge: 10s
      retry_interval: 1s
      check_interval: 5s
      details_max_size: 4096

  core:
    name: "custom Core mane"
    actors:
      probe_active:
        - ./test/testdata/scripts/probe_active.sh
        - core
      set_active: 
        - ./test/testdata/scripts/set_active.sh
        - core
      probe_passive:
        - ./test/testdata/scripts/probe_passive.sh
        - core 
      set_passive: 
        - ./test/testdata/scripts/set_passive.sh
        - core 
      force_stop: 
        - ./test/testdata/scripts/force_stop.sh
        - core
    timeouts:
      exec: 5s
      converge: 10s
      retry_interval: 1s
      check_interval: 5s
      details_max_size: 4096
  mc:
    name: "custom MC mane"
    actors:
      probe_active:
        - ./test/testdata/scripts/probe_active.sh
        - mc
      set_active: 
        - ./test/testdata/scripts/set_active.sh
        - mc
      probe_passive:
        - ./test/testdata/scripts/probe_passive.sh
        - mc 
      set_passive: 
        - ./test/testdata/scripts/set_passive.sh
        - mc 
      force_stop: 
        - ./test/testdata/scripts/force_stop.sh
        - mc
    timeouts:
      exec: 5s
      converge: 10s
      retry_interval: 1s
      check_interval: 5s
      details_max_size: 4096
